name: rstudio-workbench
description: Official Helm chart for Posit Workbench
version: 0.20.0
apiVersion: v2
appVersion: 2026.01.2
icon:
  https://raw.githubusercontent.com/rstudio/helm/main/images/posit-icon-fullcolor.svg
home: https://www.rstudio.com
sources:
  - https://github.com/rstudio/helm
maintainers:
  - name: sol-eng
    email: docker@rstudio.com
    url: https://github.com/sol-eng
dependencies:
  - name: rstudio-library
    version: 0.1.35
    repository: https://helm.rstudio.com
annotations:
  artifacthub.io/images: |
    - name: workbench
      image: posit/workbench:2026.01.2-ubuntu-24.04
    - name: workbench-session
      image: posit/workbench-session:R4.5.2-python3.14.3-ubuntu-24.04
  artifacthub.io/license: MIT
  artifacthub.io/links: |
    - name: Docker Images
      url: https://github.com/rstudio/rstudio-docker-products
    - name: RStudio Community
      url: https://community.rstudio.com/c/r-admin/5
    - name: About Workbench
      url: https://www.rstudio.com/products/workbench/
    - name: About RStudio Team
      url: https://www.rstudio.com/products/team/
keywords:
  - data science
  - machine learning
  - r
  - rstats
  - python
  - ide
  - editor
  - jupyter
  - vscode
  - rstudio
