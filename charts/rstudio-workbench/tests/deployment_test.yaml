  # -- Positron init container on server pod
  - it: should add positron init container when version is set
    template: deployment.yaml
    set:
      components:
        positron:
          version: "2026.03.0-213"
    asserts:
      - exists:
          path: 'spec.template.spec.initContainers[?(@.name=="positron-init")]'
      - equal:
          path: 'spec.template.spec.initContainers[?(@.name=="positron-init")].image'
          value: "posit/workbench-positron-init:2026.03.0-213"
      - equal:
          path: 'spec.template.spec.initContainers[?(@.name=="positron-init")].env[0].name'
          value: "PWB_POSITRON_TARGET"
      - equal:
          path: 'spec.template.spec.initContainers[?(@.name=="positron-init")].env[0].value'
          value: "positron,positron-docs"

  - it: should not add positron init container when version is empty
