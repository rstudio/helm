suite: Workbench NOTES.txt
templates:
  - NOTES.txt
tests:
  - it: should warn when components.enabled=true with r-session-complete
    set:
      components:
        enabled: true
      session:
        image:
          repository: "rstudio/r-session-complete"
    asserts:
      - matchRegexRaw:
          pattern: "WARNING.*components\\.enabled=true.*r-session-complete"

  - it: should not warn with new defaults (components.enabled=true + workbench-session)
    set:
      components:
        enabled: true
      session:
        image:
          repository: "posit/workbench-session"
    asserts:
      - notMatchRegexRaw:
          pattern: "WARNING.*components\\.enabled=true.*r-session-complete"

  - it: should not warn with legacy opt-out (components.enabled=false + r-session-complete)
    set:
      components:
        enabled: false
      session:
        image:
          repository: "rstudio/r-session-complete"
    asserts:
      - notMatchRegexRaw:
          pattern: "WARNING.*components\\.enabled=true.*r-session-complete"

  - it: should fail when image.tagPrefix is set
    set:
      image:
        tagPrefix: "ubuntu2204-"
    asserts:
      - failedTemplate:
          errorPattern: "image.tagPrefix.*has been removed.*image.os"

  - it: should fail when session.image.tagPrefix is set
    set:
      session:
        image:
          tagPrefix: "ubuntu2204-"
    asserts:
      - failedTemplate:
          errorPattern: "session.image.tagPrefix.*has been removed.*session.image.os"
