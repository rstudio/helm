suite: Workbench ConfigMap
templates:
  - configmap-general.yaml
  - configmap-prestart.yaml
  - configmap-secret.yaml
  - configmap-session.yaml
tests:
  # -- Default behavior: components enabled
  - it: should include session-init settings by default
    template: configmap-general.yaml
    documentIndex: 0
    asserts:
      - matchRegex:
          path: data["rserver.conf"]
          pattern: "launcher-sessions-auto-update=1"
      - matchRegex:
          path: data["rserver.conf"]
          pattern: "launcher-sessions-init-container-image-name=posit/workbench-session-init"
      - matchRegex:
          path: data["rserver.conf"]
          pattern: "launcher-sessions-init-container-image-tag=\\d+\\.\\d+\\.\\d+"

  - it: should use workbench-session as default session image
    template: configmap-general.yaml
    documentIndex: 0
    asserts:
      - matchRegex:
          path: data["launcher.kubernetes.profiles.conf"]
          pattern: "default-container-image=posit/workbench-session:"

  # -- Components disabled (classic mode)
  - it: should not include session-init settings when components are disabled
    template: configmap-general.yaml
    documentIndex: 0
    set:
      components:
        enabled: false
    asserts:
      - notMatchRegex:
          path: data["rserver.conf"]
          pattern: "launcher-sessions-auto-update"
      - notMatchRegex:
          path: data["rserver.conf"]
          pattern: "launcher-sessions-init-container"

  - it: should use r-session-complete when configured for classic mode
    template: configmap-general.yaml
    documentIndex: 0
    set:
      session:
        image:
          repository: "rstudio/r-session-complete"
      components:
        enabled: false
    asserts:
      - matchRegex:
          path: data["launcher.kubernetes.profiles.conf"]
          pattern: "default-container-image=rstudio/r-session-complete:"

  # -- Custom session init container
  - it: should use custom session init repository when overridden
    template: configmap-general.yaml
    documentIndex: 0
    set:
      components:
        sessionInit:
          image:
            repository: "custom-registry/session-init"
    asserts:
      - matchRegex:
          path: data["rserver.conf"]
          pattern: "launcher-sessions-init-container-image-name=custom-registry/session-init"

  - it: should use custom session init tag when overridden
    template: configmap-general.yaml
    documentIndex: 0
    set:
      components:
        sessionInit:
          image:
            tag: "jammy-2025.01.0"
    asserts:
      - matchRegex:
          path: data["rserver.conf"]
          pattern: "launcher-sessions-init-container-image-tag=jammy-2025.01.0"

  # -- versionOverride propagates to init container tag
  - it: should use versionOverride for init container tag
    template: configmap-general.yaml
    documentIndex: 0
    set:
      versionOverride: "2025.06.0"
    asserts:
      - matchRegex:
          path: data["rserver.conf"]
          pattern: "launcher-sessions-init-container-image-tag=2025.06.0"

  # -- Launcher disabled: components silently ignored
  - it: should not include session-init settings when launcher is disabled
    template: configmap-general.yaml
    documentIndex: 0
    set:
      launcher:
        enabled: false
    asserts:
      - notMatchRegex:
          path: data["rserver.conf"]
          pattern: "launcher-sessions-init-container"

  # -- Positron: rserver.conf settings
  - it: should include positron init container settings when version is set
    template: configmap-general.yaml
    documentIndex: 0
    set:
      components:
        positron:
          version: "2026.03.0-213"
    asserts:
      - matchRegex:
          path: data["rserver.conf"]
          pattern: "launcher-positron-init-container-enabled=1"
      - matchRegex:
          path: data["rserver.conf"]
          pattern: "launcher-positron-init-container-image-name=posit/workbench-positron-init"
      - matchRegex:
          path: data["rserver.conf"]
          pattern: "launcher-positron-init-container-image-tag=2026.03.0-213"

  - it: should not include positron settings when version is empty
    template: configmap-general.yaml
    documentIndex: 0
    asserts:
      - notMatchRegex:
          path: data["rserver.conf"]
          pattern: "launcher-positron-init-container"

  - it: should use custom positron image repository when overridden
    template: configmap-general.yaml
    documentIndex: 0
    set:
      components:
        positron:
          version: "2026.03.0"
          image:
            repository: "my-registry/positron-init"
    asserts:
      - matchRegex:
          path: data["rserver.conf"]
          pattern: "launcher-positron-init-container-image-name=my-registry/positron-init"

  - it: should use custom positron image tag when overridden
    template: configmap-general.yaml
    documentIndex: 0
    set:
      components:
        positron:
          version: "2026.03.0"
          image:
            tag: "custom-build-abc123"
    asserts:
      - matchRegex:
          path: data["rserver.conf"]
          pattern: "launcher-positron-init-container-image-tag=custom-build-abc123"

  - it: should not include positron settings when components are disabled
    template: configmap-general.yaml
    documentIndex: 0
    set:
      components:
        enabled: false
        positron:
          version: "2026.03.0"
    asserts:
      - notMatchRegex:
          path: data["rserver.conf"]
          pattern: "launcher-positron-init-container"

  - it: should not include positron settings when launcher is disabled
    template: configmap-general.yaml
    documentIndex: 0
    set:
      launcher:
        enabled: false
      components:
        positron:
          version: "2026.03.0"
    asserts:
      - notMatchRegex:
          path: data["rserver.conf"]
          pattern: "launcher-positron-init-container"

  # -- Positron: positron.conf exe
  - it: should set positron.conf exe to init container path when version is set
    template: configmap-general.yaml
    documentIndex: 0
    set:
      components:
        positron:
          version: "2026.03.0"
    asserts:
      - matchRegex:
          path: data["positron.conf"]
          pattern: "(?m)^exe=/usr/lib/rstudio-server/bin/positron-server/2026\\.03\\.0/bin/positron-server$"

  - it: should not set positron.conf exe when version is empty
    template: configmap-general.yaml
    documentIndex: 0
    asserts:
      - notMatchRegex:
          path: data["positron.conf"]
          pattern: "^exe="

  - it: should set positron.conf exe even when launcher is disabled
    template: configmap-general.yaml
    documentIndex: 0
    set:
      launcher:
        enabled: false
      components:
        positron:
          version: "2026.03.0"
    asserts:
      - matchRegex:
          path: data["positron.conf"]
          pattern: "(?m)^exe=/usr/lib/rstudio-server/bin/positron-server/2026\\.03\\.0/bin/positron-server$"

  - it: should not set positron.conf exe when components are disabled
    template: configmap-general.yaml
    documentIndex: 0
    set:
      components:
        enabled: false
        positron:
          version: "2026.03.0"
    asserts:
      - notMatchRegex:
          path: data["positron.conf"]
          pattern: "^exe="

  - it: should render no session components when disabled
    template: configmap-general.yaml
    documentIndex: 0
    set:
      components:
        enabled: false
      session:
        image:
          repository: "rstudio/r-session-complete"
    asserts:
      - notMatchRegex:
          path: data["rserver.conf"]
          pattern: "launcher-sessions-(auto-update|init-container)"
      - notMatchRegex:
          path: data["rserver.conf"]
          pattern: "launcher-positron-init-container"
      - notMatchRegex:
          path: data["positron.conf"]
          pattern: "^exe="

  # -- serviceAccountUser -> rserver.conf server-user
  - it: should render server-user=rstudio-server by default
    template: configmap-general.yaml
    documentIndex: 0
    asserts:
      - matchRegex:
          path: data["rserver.conf"]
          pattern: "server-user=rstudio-server"

  - it: should render server-user when serviceAccountUser is overridden
    template: configmap-general.yaml
    documentIndex: 0
    set:
      pod.serviceAccountUser: "workbench"
    asserts:
      - matchRegex:
          path: data["rserver.conf"]
          pattern: "server-user=workbench"

  - it: should omit server-user when serviceAccountUser is empty
    template: configmap-general.yaml
    documentIndex: 0
    set:
      pod.serviceAccountUser: ""
    asserts:
      - notMatchRegex:
          path: data["rserver.conf"]
          pattern: "server-user="

  - it: should let config.server.rserver.conf.server-user override serviceAccountUser
    template: configmap-general.yaml
    documentIndex: 0
    set:
      pod.serviceAccountUser: "rstudio-server"
      config:
        server:
          rserver.conf:
            server-user: "explicit-override"
    asserts:
      - matchRegex:
          path: data["rserver.conf"]
          pattern: "server-user=explicit-override"
      - notMatchRegex:
          path: data["rserver.conf"]
          pattern: "server-user=rstudio-server"

  # -- Rootless: prestart-launcher.bash has no privileged operations
  - it: should not install CA certs into the system trust store in prestart-launcher.bash
    template: configmap-prestart.yaml
    documentIndex: 0
    asserts:
      - notMatchRegex:
          path: data["prestart-launcher.bash"]
          pattern: "update-ca-certificates"
      - notMatchRegex:
          path: data["prestart-launcher.bash"]
          pattern: "update-ca-trust"
      - notMatchRegex:
          path: data["prestart-launcher.bash"]
          pattern: "/usr/local/share/ca-certificates"

  - it: should not chown launcher dirs in prestart-launcher.bash
    template: configmap-prestart.yaml
    documentIndex: 0
    asserts:
      - notMatchRegex:
          path: data["prestart-launcher.bash"]
          pattern: "chown"

  - it: should keep the launcher health check and scratch dirs in prestart-launcher.bash
    template: configmap-prestart.yaml
    documentIndex: 0
    asserts:
      - matchRegex:
          path: data["prestart-launcher.bash"]
          pattern: "--cacert"
      - matchRegex:
          path: data["prestart-launcher.bash"]
          pattern: "/var/lib/rstudio-launcher/Local"

  - it: should create launcher scratch dirs group-writable in prestart-launcher.bash
    template: configmap-prestart.yaml
    documentIndex: 0
    asserts:
      # In root mode prestart runs as root but the launcher drops to serviceAccountUser;
      # creating the scratch dirs setgid + group-writable lets the launcher write to them
      # via the rstudio-server group inherited from the parent, with no root-only chown.
      - matchRegex:
          path: data["prestart-launcher.bash"]
          pattern: "install -d -m 2775"
      - notMatchRegex:
          path: data["prestart-launcher.bash"]
          pattern: "mkdir -p"

  # -- Rootless: prestart-workbench.bash has no privileged operations
  - it: should not chown or create monitor dirs in prestart-workbench.bash
    template: configmap-prestart.yaml
    documentIndex: 0
    asserts:
      - notMatchRegex:
          path: data["prestart-workbench.bash"]
          pattern: "chown"
      - notMatchRegex:
          path: data["prestart-workbench.bash"]
          pattern: "/var/lib/rstudio-server/monitor/log"

  - it: should keep launcher.pub generation and README write in prestart-workbench.bash
    template: configmap-prestart.yaml
    documentIndex: 0
    asserts:
      - matchRegex:
          path: data["prestart-workbench.bash"]
          pattern: "openssl rsa"
      - matchRegex:
          path: data["prestart-workbench.bash"]
          pattern: "/etc/rstudio/README"

  # -- runAsRoot -> rootless config defaults
  - it: should apply rootless config defaults when runAsRoot is false
    template: configmap-general.yaml
    documentIndex: 0
    set:
      pod.runAsRoot: false
    asserts:
      - matchRegex:
          path: data["rserver.conf"]
          pattern: "(?m)^auth-pam-sessions-enabled=0$"
      - matchRegex:
          path: data["rserver.conf"]
          pattern: "(?m)^user-provisioning-enabled=1$"
      - matchRegex:
          path: data["rserver.conf"]
          pattern: "(?m)^launcher-sessions-create-container-user=0$"
      - matchRegex:
          path: data["launcher.conf"]
          pattern: "secure-cookie-key-file=/mnt/secret-configmap/rstudio/secure-cookie-key"

  - it: should keep PAM sessions on and not force provisioning when runAsRoot is true
    template: configmap-general.yaml
    documentIndex: 0
    asserts:
      - matchRegex:
          path: data["rserver.conf"]
          pattern: "(?m)^auth-pam-sessions-enabled=1$"
      - notMatchRegex:
          path: data["rserver.conf"]
          pattern: "user-provisioning-enabled"
      - notMatchRegex:
          path: data["rserver.conf"]
          pattern: "launcher-sessions-create-container-user"
      - notMatchRegex:
          path: data["launcher.conf"]
          pattern: "secure-cookie-key-file"

  - it: should let config.server override the rootless auth defaults
    template: configmap-general.yaml
    documentIndex: 0
    set:
      pod.serviceAccountUser: "rstudio-server"
      config:
        server:
          rserver.conf:
            auth-pam-sessions-enabled: 1
            user-provisioning-enabled: 0
    asserts:
      - matchRegex:
          path: data["rserver.conf"]
          pattern: "(?m)^auth-pam-sessions-enabled=1$"
      - matchRegex:
          path: data["rserver.conf"]
          pattern: "(?m)^user-provisioning-enabled=0$"
