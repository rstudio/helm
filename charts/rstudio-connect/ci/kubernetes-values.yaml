license:
  file:
    secret: pct-license
    secretKey: pct.lic

launcher:
  enabled: false

backends:
  kubernetes:
    enabled: true

# a PVC is required for Connect to run in OHE (now the default)
sharedStorage:
  create: true
  # normally this should be ReadWriteMany, setting just for CI
  accessModes:
    - ReadWriteOnce
