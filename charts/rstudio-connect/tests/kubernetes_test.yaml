suite: test kubernetes configuration
templates:
  - NOTES.txt
  - configmap-prestart.yaml
  - configmap.yaml
  - deployment.yaml
  - rbac.yaml
tests:
  # Test validation: launcher.enabled and backends.kubernetes.enabled cannot both be true
  - it: should fail when both launcher.enabled and backends.kubernetes.enabled are true
    template: NOTES.txt
    set:
      launcher:
        enabled: true
      backends:
        kubernetes:
          enabled: true
    asserts:
      - failedTemplate:
          errorPattern: "launcher.enabled.*and.*backends.kubernetes.enabled.*cannot both be true"

  # Test backends.kubernetes.enabled creates configmap entries for job base
  - it: should create job.yaml in configmap when backends.kubernetes.enabled
    template: configmap.yaml
    values:
      - kubernetes-values.yaml
    asserts:
      - exists:
          path: data["job.yaml"]
      - matchRegex:
          path: data["job.yaml"]
          pattern: "apiVersion: batch/v1"
      - matchRegex:
          path: data["job.yaml"]
          pattern: "kind: Job"

  - it: should not create job.yaml when backends.kubernetes.enabled is false
    template: configmap.yaml
    set:
      launcher:
        enabled: false
      backends:
        kubernetes:
          enabled: false
    asserts:
      - notExists:
          path: data["job.yaml"]

  # Test deployment volumeMounts for kubernetes resource bases
  - it: should mount job.yaml when backends.kubernetes.enabled
    template: deployment.yaml
    values:
      - kubernetes-values.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: rstudio-connect-config
            mountPath: /etc/rstudio-connect/job.yaml
            subPath: job.yaml

  - it: should not mount job.yaml when backends.kubernetes.enabled is false
    template: deployment.yaml
    set:
      launcher:
        enabled: false
      backends:
        kubernetes:
          enabled: false
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: rstudio-connect-config
            mountPath: /etc/rstudio-connect/job.yaml
            subPath: job.yaml

  # Test prestart volumeMount is only present when launcher or kubernetes is enabled
  - it: should mount prestart scripts when backends.kubernetes.enabled
    template: deployment.yaml
    values:
      - kubernetes-values.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: rstudio-connect-prestart
            mountPath: /scripts/

  - it: should mount prestart scripts when launcher.enabled only
    template: deployment.yaml
    set:
      launcher:
        enabled: true
      backends:
        kubernetes:
          enabled: false
      sharedStorage:
        create: true
        mount: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: rstudio-connect-prestart
            mountPath: /scripts/

  - it: should not mount prestart scripts when neither launcher nor kubernetes is enabled
    template: deployment.yaml
    set:
      launcher:
        enabled: false
      backends:
        kubernetes:
          enabled: false
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: rstudio-connect-prestart
            mountPath: /scripts/

  # Test custom mount paths for job.yaml and service.yaml
  - it: should use custom DefaultResourceJobBase path for job.yaml mount
    template: deployment.yaml
    set:
      launcher:
        enabled: false
      backends:
        kubernetes:
          enabled: true
      config:
        Kubernetes:
          DefaultResourceJobBase: /custom/path/job.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: rstudio-connect-config
            mountPath: /custom/path/job.yaml
            subPath: job.yaml

  - it: should use custom DefaultResourceServiceBase path for service.yaml mount
    template: deployment.yaml
    set:
      launcher:
        enabled: false
      backends:
        kubernetes:
          enabled: true
          defaultResourceServiceBase:
            metadata:
              labels:
                test: value
      config:
        Kubernetes:
          DefaultResourceServiceBase: /custom/path/service.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: rstudio-connect-config
            mountPath: /custom/path/service.yaml
            subPath: service.yaml

  # Test RBAC resources are created when backends.kubernetes.enabled
  - it: should create RBAC resources when backends.kubernetes.enabled and rbac.create are true
    template: rbac.yaml
    set:
      launcher:
        enabled: false
      backends:
        kubernetes:
          enabled: true
      rbac:
        create: true
    asserts:
      - hasDocuments:
          count: 3 # ServiceAccount, Role, RoleBinding

  - it: should not create RBAC resources when backends.kubernetes.enabled is false and launcher.enabled is false
    template: rbac.yaml
    set:
      launcher:
        enabled: false
      backends:
        kubernetes:
          enabled: false
      rbac:
        create: true
    asserts:
      - hasDocuments:
          count: 0

  # Test kubernetes namespace configuration
  - it: should use custom namespace when backends.kubernetes.namespace is specified
    template: rbac.yaml
    set:
      launcher:
        enabled: false
      backends:
        kubernetes:
          enabled: true
          namespace: custom-namespace
      rbac:
        create: true
    documentIndex: 1 # Role document
    asserts:
      - equal:
          path: metadata.namespace
          value: custom-namespace

  - it: should use release namespace when backends.kubernetes.namespace is not specified
    template: rbac.yaml
    release:
      namespace: test-namespace
    set:
      launcher:
        enabled: false
      backends:
        kubernetes:
          enabled: true
      rbac:
        create: true
    documentIndex: 1 # Role document
    asserts:
      - equal:
          path: metadata.namespace
          value: test-namespace

  # Test serviceAccount configuration with backends.kubernetes.enabled
  - it: should set serviceAccountName when backends.kubernetes.enabled and rbac.create are true
    template: deployment.yaml
    set:
      launcher:
        enabled: false
      backends:
        kubernetes:
          enabled: true
      rbac:
        create: true
        serviceAccount:
          create: true
          name: custom-sa
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: custom-sa

  # Test that sharedStorage.mountContent propagates to kubernetes config
  - it: should configure DataDirPVCName when sharedStorage is enabled and mountContent is true
    template: configmap.yaml
    release:
      name: my-connect
    set:
      launcher:
        enabled: false
      backends:
        kubernetes:
          enabled: true
      sharedStorage:
        create: true
        mount: true
        mountContent: true
    documentIndex: 0
    asserts:
      - matchRegex:
          path: data["rstudio-connect.gcfg"]
          pattern: "DataDirPVCName = my-connect-rstudio-connect-shared-storage"

  - it: should not configure DataDirPVCName when sharedStorage.mountContent is false
    template: configmap.yaml
    set:
      launcher:
        enabled: false
      backends:
        kubernetes:
          enabled: true
      sharedStorage:
        create: true
        mount: true
        mountContent: false
    documentIndex: 0
    asserts:
      - notMatchRegex:
          path: data["rstudio-connect.gcfg"]
          pattern: "DataDirPVCName"

  # Test kubernetes config section in rstudio-connect.gcfg
  - it: should configure Kubernetes.Enabled in gcfg when backends.kubernetes.enabled is true
    template: configmap.yaml
    set:
      launcher:
        enabled: false
      backends:
        kubernetes:
          enabled: true
          namespace: k8s-namespace
    asserts:
      - matchRegex:
          path: data["rstudio-connect.gcfg"]
          pattern: "\\[Kubernetes\\]"
      - matchRegex:
          path: data["rstudio-connect.gcfg"]
          pattern: "Enabled = true"
      - matchRegex:
          path: data["rstudio-connect.gcfg"]
          pattern: "Namespace = k8s-namespace"

  - it: should configure DefaultResourceJobBase path when backends.kubernetes.enabled
    template: configmap.yaml
    values:
      - kubernetes-values.yaml
    asserts:
      - matchRegex:
          path: data["rstudio-connect.gcfg"]
          pattern: "DefaultResourceJobBase = /etc/rstudio-connect/job.yaml"

  # Test with both launcher disabled and kubernetes enabled
  - it: should work correctly with launcher disabled and kubernetes enabled
    template: deployment.yaml
    set:
      launcher:
        enabled: false
      backends:
        kubernetes:
          enabled: true
      rbac:
        create: true
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: spec.template.spec.serviceAccountName
          value: RELEASE-NAME-rstudio-connect

  # Test serviceAccount is set correctly when backends.kubernetes.enabled
  - it: should generate default serviceAccountName when backends.kubernetes.enabled
    template: deployment.yaml
    set:
      launcher:
        enabled: false
      backends:
        kubernetes:
          enabled: true
      rbac:
        create: true
        serviceAccount:
          create: true
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: RELEASE-NAME-rstudio-connect

  # Test that config includes Kubernetes section
  - it: should include Kubernetes config section when enabled
    template: configmap.yaml
    set:
      launcher:
        enabled: false
      backends:
        kubernetes:
          enabled: true
    documentIndex: 0
    asserts:
      - matchRegex:
          path: data["rstudio-connect.gcfg"]
          pattern: "\\[Kubernetes\\]"

  # Test auto-generated job base contains init container
  - it: should auto-generate job.yaml with init container and correct image
    template: configmap.yaml
    set:
      launcher:
        enabled: false
      backends:
        kubernetes:
          enabled: true
    asserts:
      - matchRegex:
          path: data["job.yaml"]
          pattern: "name: connect-content-init"
      - matchRegex:
          path: data["job.yaml"]
          pattern: "image: ghcr.io/rstudio/rstudio-connect-content-init:ubuntu2204-"
      - matchRegex:
          path: data["job.yaml"]
          pattern: "name: connect-content"
      - matchRegex:
          path: data["job.yaml"]
          pattern: "name: rsc-volume"

  - it: should ensure rsc-volume mount on user-provided connect-content-init
    template: configmap.yaml
    set:
      launcher:
        enabled: false
      backends:
        kubernetes:
          enabled: true
          defaultResourceJobBase:
            spec:
              template:
                spec:
                  initContainers:
                    - name: connect-content-init
                      image: custom-image:latest
    asserts:
      - matchRegex:
          path: data["job.yaml"]
          pattern: "name: connect-content-init"
      - matchRegex:
          path: data["job.yaml"]
          pattern: "/mnt/rstudio-connect-runtime/"
      - matchRegex:
          path: data["job.yaml"]
          pattern: "name: rsc-volume"

  - it: should add rsc-volume mount to connect-content even if another volume uses same mountPath
    template: configmap.yaml
    set:
      launcher:
        enabled: false
      backends:
        kubernetes:
          enabled: true
          defaultResourceJobBase:
            spec:
              template:
                spec:
                  containers:
                    - name: connect-content
                      volumeMounts:
                        - name: other-volume
                          mountPath: /opt/rstudio-connect
    asserts:
      - matchRegex:
          path: data["job.yaml"]
          pattern: "name: rsc-volume"
      - matchRegex:
          path: data["job.yaml"]
          pattern: "name: other-volume"

  - it: should not include init container when defaultInitContainer.enabled is false
    template: configmap.yaml
    set:
      launcher:
        enabled: false
      backends:
        kubernetes:
          enabled: true
          defaultInitContainer:
            enabled: false
    asserts:
      - exists:
          path: data["job.yaml"]
      - notMatchRegex:
          path: data["job.yaml"]
          pattern: "connect-content-init"

  # Test 1: NodePort triggers ClusterRole auto-create
  # Template order: ClusterRole(0), ClusterRoleBinding(1), SA(2), Role(3), RoleBinding(4)
  - it: should create ClusterRole with nodes/get when service type is NodePort
    template: rbac.yaml
    set:
      launcher:
        enabled: false
      backends:
        kubernetes:
          enabled: true
          defaultResourceServiceBase:
            spec:
              type: NodePort
      rbac:
        create: true
        clusterRoleCreate: false
    asserts:
      - isKind:
          of: ClusterRole
        documentIndex: 0
      - isKind:
          of: ClusterRoleBinding
        documentIndex: 1
      - equal:
          path: rules[0].resources
          value: ["nodes"]
        documentIndex: 0
      - equal:
          path: rules[0].verbs
          value: ["get"]
        documentIndex: 0

  # Test 2: Explicit rbac.clusterRoleCreate=true creates ClusterRole even without NodePort
  # Template order: ClusterRole(0), ClusterRoleBinding(1), SA(2), Role(3), RoleBinding(4)
  - it: should create ClusterRole when rbac.clusterRoleCreate is true regardless of service type
    template: rbac.yaml
    set:
      launcher:
        enabled: false
      backends:
        kubernetes:
          enabled: true
      rbac:
        create: true
        clusterRoleCreate: true
    asserts:
      - isKind:
          of: ClusterRole
        documentIndex: 0
      - isKind:
          of: ClusterRoleBinding
        documentIndex: 1

  # Test 3: rbac.serviceAccount.create=false skips SA but Role/RoleBinding reference configured name
  # Renders: Role(0), RoleBinding(1)
  - it: should not create ServiceAccount when rbac.serviceAccount.create is false
    template: rbac.yaml
    set:
      launcher:
        enabled: false
      backends:
        kubernetes:
          enabled: true
      rbac:
        create: true
        clusterRoleCreate: false
        serviceAccount:
          create: false
          name: custom-sa
    asserts:
      - hasDocuments:
          count: 2
      - isKind:
          of: Role
        documentIndex: 0
      - isKind:
          of: RoleBinding
        documentIndex: 1
      - equal:
          path: subjects[0].name
          value: custom-sa
        documentIndex: 1

  # Test 4: rbac.create=false with native runner enabled renders no RBAC docs
  - it: should not create any RBAC resources when rbac.create is false
    template: rbac.yaml
    set:
      launcher:
        enabled: false
      backends:
        kubernetes:
          enabled: true
      rbac:
        create: false
    asserts:
      - hasDocuments:
          count: 0

  # Test 5: configmap-prestart gating
  - it: should create configmap-prestart when backends.kubernetes.enabled
    template: configmap-prestart.yaml
    values:
      - kubernetes-values.yaml
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ConfigMap

  - it: should create configmap-prestart when launcher.enabled
    template: configmap-prestart.yaml
    set:
      launcher:
        enabled: true
      backends:
        kubernetes:
          enabled: false
      sharedStorage:
        create: true
        mount: true
    asserts:
      - hasDocuments:
          count: 1

  - it: should not create configmap-prestart when neither is enabled
    template: configmap-prestart.yaml
    set:
      launcher:
        enabled: false
      backends:
        kubernetes:
          enabled: false
    asserts:
      - hasDocuments:
          count: 0

  # Test 6: checksum/config-prestart annotation gating
  - it: should include checksum/config-prestart annotation when backends.kubernetes.enabled
    template: deployment.yaml
    values:
      - kubernetes-values.yaml
    asserts:
      - exists:
          path: spec.template.metadata.annotations["checksum/config-prestart"]

  - it: should include checksum/config-prestart annotation when launcher.enabled only
    template: deployment.yaml
    set:
      launcher:
        enabled: true
      backends:
        kubernetes:
          enabled: false
      sharedStorage:
        create: true
        mount: true
    asserts:
      - exists:
          path: spec.template.metadata.annotations["checksum/config-prestart"]

  - it: should not include checksum/config-prestart annotation when neither is enabled
    template: deployment.yaml
    set:
      launcher:
        enabled: false
      backends:
        kubernetes:
          enabled: false
    asserts:
      - notExists:
          path: spec.template.metadata.annotations["checksum/config-prestart"]

  # Test 7: Init image tag precedence — explicit tag overrides tagPrefix+appVersion
  - it: should use explicit defaultInitContainer.tag when set
    template: configmap.yaml
    set:
      launcher:
        enabled: false
      backends:
        kubernetes:
          enabled: true
          defaultInitContainer:
            tag: "custom-tag-1.2.3"
    asserts:
      - matchRegex:
          path: data["job.yaml"]
          pattern: "image: ghcr.io/rstudio/rstudio-connect-content-init:custom-tag-1.2.3"

  - it: should use tagPrefix plus appVersion when tag is not set
    template: configmap.yaml
    set:
      launcher:
        enabled: false
      backends:
        kubernetes:
          enabled: true
          defaultInitContainer:
            tagPrefix: "jammy-"
    asserts:
      - matchRegex:
          path: data["job.yaml"]
          pattern: "image: ghcr.io/rstudio/rstudio-connect-content-init:jammy-\\d+\\.\\d+\\.\\d+"

  - it: should preserve user-provided sidecar and nodeSelector in job base
    template: configmap.yaml
    set:
      launcher:
        enabled: false
      backends:
        kubernetes:
          enabled: true
          defaultResourceJobBase:
            spec:
              template:
                spec:
                  nodeSelector:
                    workload: content
                  containers:
                    - name: logging-sidecar
                      image: busybox
    asserts:
      - matchRegex:
          path: data["job.yaml"]
          pattern: "name: logging-sidecar"
      - matchRegex:
          path: data["job.yaml"]
          pattern: "workload: content"
      - matchRegex:
          path: data["job.yaml"]
          pattern: "name: connect-content-init"
      - matchRegex:
          path: data["job.yaml"]
          pattern: "name: connect-content"
