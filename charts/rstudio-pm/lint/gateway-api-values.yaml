license:
  key: test
nodePort: 32420
metricsNodePort: 32112
replicas: 1
config:
  HTTP:
    Listen: :4242
  Server:
    DataDir: /var/lib/rstudio-pm
    RVersion:
      - /opt/R/3.6.2
  Git:
    BuilderDir: "/tmp/git"
gatewayApi:
  enabled: true
  parentRefs:
    - name: example-gateway
      kind: Gateway
      group: gateway.networking.k8s.io
  hosts:
    - host: pm.example.com
      paths:
        - /
