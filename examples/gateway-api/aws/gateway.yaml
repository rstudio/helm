# Single ALB for all attached HTTPRoutes. Namespace must match LoadBalancerConfiguration.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: posit-shared-alb
  namespace: posit-gateway
spec:
  gatewayClassName: aws-alb
  infrastructure:
    parametersRef:
      group: gateway.k8s.aws
      kind: LoadBalancerConfiguration
      name: posit-shared-alb-lbconfig
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
    - name: https
      protocol: HTTPS
      port: 443
      allowedRoutes:
        namespaces:
          from: All
